# ci-validate - PR gate: validate the deck config and diff against the
# configured Konnect control plane, plus kongctl schema check and plan
# dry-run for the API catalog.
#
# Offline validation (deck gateway validate) always runs — no credentials
# needed. The deck gateway diff and kongctl plan stage gates post PR
# comments showing what will change; both skip cleanly when KONNECT_SPAT
# is absent (forks, first-time setup).
#
# GitHub secrets / variables required (repo-level or environment-level):
#   KONNECT_SPAT         - Konnect service account personal access token
#   KONNECT_SERVER_URL   - Konnect API address (e.g. https://us.api.konghq.com)
#   KONNECT_CONTROL_PLANE - target control plane name (e.g. petstore-dev)
name: ci-validate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  deck:
    name: decK validate / diff
    runs-on: ubuntu-latest
    env:
      KONNECT_SPAT: ${{ secrets.KONNECT_SPAT }}
      KONNECT_SERVER_URL: ${{ vars.KONNECT_SERVER_URL }}
      KONNECT_CONTROL_PLANE: ${{ vars.KONNECT_CONTROL_PLANE }}
    steps:
      - uses: actions/checkout@v4

      - uses: Kong/setup-deck@v1
        with:
          deck-version: '1.64.0'
          wrapper: false

      - name: deck gateway validate
        id: validate
        if: env.KONNECT_SPAT != ''
        continue-on-error: true
        run: |
          deck gateway validate kong/kong.yaml \
            --konnect-token "$KONNECT_SPAT" \
            --konnect-addr "$KONNECT_SERVER_URL" \
            --konnect-control-plane-name "$KONNECT_CONTROL_PLANE" \
            > /tmp/deck-validate.txt 2>&1

      - name: Post validation failure as PR comment
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## deck gateway validate failed'
            echo "Control plane: \`${KONNECT_CONTROL_PLANE}\` at \`${KONNECT_SERVER_URL}\`"
            echo '```'
            cat /tmp/deck-validate.txt
            echo '```'
          } > /tmp/deck-validate.md
          cat /tmp/deck-validate.md >> "$GITHUB_STEP_SUMMARY"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/deck-validate.md
          exit 1

      - name: Stage gate - deck gateway diff against control plane (PR comment)
        if: env.KONNECT_SPAT != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deck gateway diff kong/kong.yaml \
            --konnect-token "$KONNECT_SPAT" \
            --konnect-addr "$KONNECT_SERVER_URL" \
            --konnect-control-plane-name "$KONNECT_CONTROL_PLANE" \
            > /tmp/deck-diff.txt
          {
            echo '## deck gateway diff'
            echo "Control plane: \`${KONNECT_CONTROL_PLANE}\` at \`${KONNECT_SERVER_URL}\`"
            echo '```'
            cat /tmp/deck-diff.txt
            echo '```'
          } > /tmp/deck-comment.md
          cat /tmp/deck-comment.md >> "$GITHUB_STEP_SUMMARY"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/deck-comment.md

      - name: Stage gate skipped notice
        if: env.KONNECT_SPAT == ''
        run: echo 'KONNECT_SPAT not configured - deck gateway diff stage gate skipped.' >> "$GITHUB_STEP_SUMMARY"

  kongctl:
    name: kongctl schema check / plan dry-run
    runs-on: ubuntu-latest
    env:
      KONGCTL_DEFAULT_KONNECT_PAT: ${{ secrets.KONNECT_SPAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kongctl
        run: |
          curl -sSfL -o /tmp/kongctl.zip \
            https://github.com/Kong/kongctl/releases/download/v1.4.0/kongctl_linux_amd64.zip
          unzip -o /tmp/kongctl.zip -d /tmp/kongctl-dist kongctl
          sudo install /tmp/kongctl-dist/kongctl /usr/local/bin/kongctl
          kongctl version

      # Schema check without credentials: a dummy PAT drives full
      # parse/schema validation — YAML parse errors, unknown fields, and
      # bad !file paths all fail BEFORE auth with distinct errors; a clean
      # config fails only at the state fetch with a 401 body.
      # Exit 0 or a 401 body = pass; anything else = real error.
      - name: Schema check - kongctl plan with dummy PAT (401 expected)
        env:
          KONGCTL_DEFAULT_KONNECT_PAT: dummy-pat-schema-check
        run: |
          set +e
          kongctl plan -f kong/konnect/ -R --base-dir . > /tmp/kongctl-schema-check.txt 2>&1
          status=$?
          cat /tmp/kongctl-schema-check.txt
          if [ "$status" -eq 0 ] || grep -q '"status":401' /tmp/kongctl-schema-check.txt; then
            echo 'Parse/schema validation passed (401 auth failure is the expected dummy-PAT outcome).'
            exit 0
          fi
          exit "$status"

      - name: Stage gate - kongctl plan dry-run (PR comment)
        if: env.KONGCTL_DEFAULT_KONNECT_PAT != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          kongctl plan -f kong/konnect/ -R --base-dir . --output-file /tmp/kongctl-plan.json
          kongctl diff -f kong/konnect/ -R --base-dir . --mode apply > /tmp/kongctl-diff.txt
          {
            echo '## kongctl diff --mode apply'
            echo '```'
            cat /tmp/kongctl-diff.txt
            echo '```'
          } > /tmp/kongctl-comment.md
          cat /tmp/kongctl-comment.md >> "$GITHUB_STEP_SUMMARY"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/kongctl-comment.md

      - name: Stage gate skipped notice
        if: env.KONGCTL_DEFAULT_KONNECT_PAT == ''
        run: echo 'KONNECT_SPAT not configured - kongctl plan dry-run skipped.' >> "$GITHUB_STEP_SUMMARY"
