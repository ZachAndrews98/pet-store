_format_version: "3.0"
services:
- connect_timeout: 60000
  enabled: true
  host: httpbin.konghq.com
  name: petstore_svc
  path: /anything
  port: 443
  protocol: https
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: petstore_rt
    path_handling: v0
    paths:
    - /pets
    preserve_host: false
    protocols:
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
  write_timeout: 60000
  plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: false
      anonymous: null
      key_in_header: true
      key_in_query: true
      key_in_body: false
      run_on_preflight: true
      realm: null
      identity_realms:
        - scope: cp
      principals:
        enabled: false
        directory: default
        error_on_miss: true
    enabled: true
  - name: cors
    config:
      origins:
        - "*"
      headers: null
      exposed_headers: null
      methods:
        - GET
        - HEAD
        - PUT
        - PATCH
        - POST
        - DELETE
        - OPTIONS
        - TRACE
        - CONNECT
      max_age: null
      credentials: false
      preflight_continue: false
      private_network: false
      allow_origin_absent: true
    enabled: true
